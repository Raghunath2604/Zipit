upstream zipit_api {
    server api:8000;
}

upstream zipit_dashboard {
    server dashboard:8502;
}

upstream zipit_admin {
    server admin:8503;
}

upstream zipit_automl {
    server automl:8504;
}

upstream mlflow_server {
    server mlflow:5000;
}

server {
    listen 80;
    server_name zipit.com www.zipit.com;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zipit.com www.zipit.com;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/zipit.com.crt;
    ssl_certificate_key /etc/nginx/ssl/zipit.com.key;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # Main dashboard (default)
    location / {
        proxy_pass http://zipit_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API endpoints
    location /api/ {
        proxy_pass http://zipit_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "ZipIt Platform Healthy\n";
        add_header Content-Type text/plain;
    }
}