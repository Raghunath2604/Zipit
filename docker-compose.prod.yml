version: '3.8'

services:
  mlops-platform:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./mlops_platform.db
      - SECRET_KEY=your-production-secret-key-change-this
    volumes:
      - ./models:/app/models
      - ./mlops_platform.db:/app/mlops_platform.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - mlops-platform
    restart: unless-stopped