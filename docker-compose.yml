version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: zipit_postgres
    environment:
      POSTGRES_DB: zipit_db
      POSTGRES_USER: zipit_user
      POSTGRES_PASSWORD: zipit_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - zipit_network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: zipit_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zipit_network
    restart: unless-stopped

  # Main Application
  app:
    build: 
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: zipit_app
    environment:
      - DATABASE_URL=postgresql://zipit_user:zipit_pass@postgres:5432/zipit_db
      - REDIS_URL=redis://redis:6379
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
      - redis
    networks:
      - zipit_network
    restart: unless-stopped

  # API Service
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: zipit_api
    environment:
      - DATABASE_URL=postgresql://zipit_user:zipit_pass@postgres:5432/zipit_db
      - REDIS_URL=redis://redis:6379
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - zipit_network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: zipit_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/mlops-platform.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app
      - api
    networks:
      - zipit_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  zipit_network:
    driver: bridge