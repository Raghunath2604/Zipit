services:
  - type: web
    name: mlops-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn mlops_platform:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./mlops_platform.db