name: ZipIt MLOps Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import mlops_platform; print('✅ Platform ready')"
        python -c "import mlops_connector; print('✅ Connector ready')"
    
    - name: Railway Deploy Ready
      run: |
        echo "🚀 ZipIt MLOps ready for Railway deployment"
        echo "✅ All dependencies installed"
        echo "✅ Platform tested"
        echo "✅ Auto-deploy from main branch"