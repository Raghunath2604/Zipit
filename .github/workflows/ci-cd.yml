name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install fastapi uvicorn sqlalchemy pydantic[email] python-multipart
        pip install jinja2 pyjwt requests numpy scikit-learn joblib scipy pandas
    
    - name: Test platform
      run: |
        python -c "import mlops_platform; print('OK')"
    
    - name: Success
      run: echo "✅ Tests passed"