name: ZipIt MLOps CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test platform
      run: |
        python -c "
        import sys
        print('Testing platform...')
        
        # Test imports
        import mlops_platform
        from mlops_platform import app
        print('✅ Imports successful')
        
        # Test database
        from mlops_platform import Base, engine
        Base.metadata.create_all(bind=engine)
        print('✅ Database setup successful')
        
        # Test API
        from fastapi.testclient import TestClient
        client = TestClient(app)
        response = client.get('/health')
        assert response.status_code == 200
        print('✅ API working')
        
        print('🎉 All tests passed!')
        "
    
    - name: Build Docker
      run: |
        docker build -t zipit-mlops .
        echo "✅ Docker build successful"
    
    - name: Success
      run: |
        echo "🚀 ZipIt MLOps Platform Ready!"
        echo "✅ All tests passed"
        echo "✅ Docker build successful"
        echo "🌐 Ready for Railway deployment"
        echo "📦 Repository: https://github.com/Raghunath2604/Zipit.git"