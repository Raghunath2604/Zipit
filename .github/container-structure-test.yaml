schemaVersion: 2.0.0

commandTests:
  - name: "Python version check"
    command: "python"
    args: ["--version"]
    expectedOutput: ["Python 3.9.*"]

  - name: "Application startup test"
    command: "python"
    args: ["-c", "import mlops_platform; print('OK')"]
    expectedOutput: ["OK"]

  - name: "Health check endpoint"
    command: "curl"
    args: ["-f", "http://localhost:8000/health"]
    setup: [["python", "-m", "uvicorn", "mlops_platform:app", "--host", "0.0.0.0", "--port", "8000", "&"]]

fileExistenceTests:
  - name: "Application files"
    path: "/app/mlops_platform.py"
    shouldExist: true

  - name: "Requirements file"
    path: "/app/requirements.txt"
    shouldExist: true

  - name: "Models directory"
    path: "/app/models"
    shouldExist: true

fileContentTests:
  - name: "Non-root user"
    path: "/etc/passwd"
    expectedContents: ["mlops:.*"]

metadataTest:
  exposedPorts: ["8000"]
  user: "mlops"
  workdir: "/app"